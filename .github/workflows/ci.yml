name: CI - Build & Test

on:
  push:
    branches: [main, develop, feature/agentic-research-workflow]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile check
        run: |
          python -m compileall src/ -q
          python -m compileall tests/ -q

      - name: Verify package import
        run: python -c "from qrc_ev import __version__; print(f'qrc_ev v{__version__}')"

      - name: Type check
        run: mypy src/qrc_ev/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --cov=src/qrc_ev --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  paper:
    runs-on: ubuntu-latest
    container: registry.access.redhat.com/ubi8/texlive

    steps:
      - uses: actions/checkout@v4

      - name: Build paper
        run: |
          pdflatex -interaction=nonstopmode -output-directory=_build paper/main.tex
          bibtex _build/main || true
          pdflatex -interaction=nonstopmode -output-directory=_build paper/main.tex
          pdflatex -interaction=nonstopmode -output-directory=_build paper/main.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: _build/main.pdf
